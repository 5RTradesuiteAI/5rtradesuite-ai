<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tomas Rivera – 5R Training and Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Lora:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root{--accent:#0EA5E9;--accent-light:#38BDF8;--accent-dim:rgba(100,100,200,0.1);--dark:#080A0E;--panel:#0E1118;--panel2:#131820;--border:#1E2535;--text:#E2E8F0;--muted:#4A5568;--bot-bubble:#131820;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Lato',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;}
  .container{width:100%;max-width:480px;display:flex;flex-direction:column;animation:fadeUp 0.5s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .header{background:var(--panel);border:1px solid var(--border);border-bottom:none;border-radius:16px 16px 0 0;padding:20px 24px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light),var(--accent));background-size:200%;animation:shimmer 3s linear infinite;}
  @keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
  .bot-avatar{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
  .bot-info h1{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--text);}
  .bot-info h1 span{color:var(--accent-light);}
  .bot-info p{font-size:12px;color:var(--muted);margin-top:3px;}
  .status-dot{width:7px;height:7px;background:#22C55E;border-radius:50%;display:inline-block;margin-right:5px;box-shadow:0 0 6px #22C55E;animation:pulse 2s ease infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .chat-window{background:var(--panel);border-left:1px solid var(--border);border-right:1px solid var(--border);height:420px;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
  .chat-window::-webkit-scrollbar{width:4px;}.chat-window::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .msg{display:flex;gap:8px;animation:msgIn 0.3s ease both;max-width:90%;}
  @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.bot{align-self:flex-start}.msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg-avatar{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
  .msg.user .msg-avatar{background:var(--border);}
  .bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;}
  .msg.bot .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-radius:4px 12px 12px 12px;color:var(--text);}
  .msg.user .bubble{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;font-weight:600;border-radius:12px 4px 12px 12px;}
  .quick-replies{display:flex;flex-wrap:wrap;gap:7px;padding:4px 0 4px 38px;}
  .qr-btn{background:transparent;border:1px solid var(--accent-light);color:var(--accent-light);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .qr-btn:hover{opacity:0.8;}
  .typing{display:flex;align-items:center;gap:8px;align-self:flex-start;}
  .typing-dots{background:var(--bot-bubble);border:1px solid var(--border);border-radius:4px 12px 12px 12px;padding:12px 16px;display:flex;gap:4px;align-items:center;}
  .typing-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s ease infinite;}
  .typing-dots span:nth-child(2){animation-delay:0.2s}.typing-dots span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}
  .input-area{background:var(--panel2);border:1px solid var(--border);border-radius:0 0 16px 16px;padding:14px 16px;display:flex;gap:10px;align-items:flex-end;}
  .input-wrap{flex:1;background:var(--dark);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;padding:2px 4px 2px 12px;}
  #userInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;padding:10px 8px 10px 0;resize:none;max-height:100px;line-height:1.4;}
  #userInput::placeholder{color:var(--muted);}
  #sendBtn{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  #sendBtn svg{width:18px;height:18px;fill:#fff;}
  .footer-tag{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;}
  .footer-tag span{color:var(--accent-light);font-weight:700;}
  .back-link{text-align:center;margin-bottom:8px;}
  .back-link a{color:var(--muted);font-size:12px;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
  <div class="back-link"><a href="/dashboard/">← Command Center</a></div>
  <div class="header">
    <div class="bot-avatar">📚</div>
    <div class="bot-info">
      <h1><span>Tomas Rivera</span> · Training and Curriculum</h1>
      <p><span class="status-dot"></span>5R AI Operations Team · 5Royals Investments LLC</p>
    </div>
  </div>
  <div class="chat-window" id="chatWindow"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Talk to Tomas Rivera..." rows="1"></textarea>
    </div>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
    </button>
  </div>
</div>
<p class="footer-tag">Powered by <span>5Royals Investments LLC</span> · Tomas Rivera · Training and Curriculum AI Agent v2</p>
<script>
const SYSTEM_PROMPT = `You are Tomas Rivera, the Training and Curriculum for 5Royals Investments LLC and the entire 5R ecosystem.

=========================================================
5R ECOSYSTEM CONTEXT — READ THIS FIRST
=========================================================
You are part of the 5R AI Operations Team for 5Royals Investments LLC, owned by Ed Prince (Air Force veteran, 23 years service). Ed goes by Ed. His legal name is Don.

THE 5R ECOSYSTEM — 14 BUSINESSES:
1. 5R TradeSuite AI — AI agents for skilled tradesmen (PRIMARY)
2. 5R2TrueSuccess / 5REngine — Amazon marketplace
3. 5RClickBank SuccessAI — ClickBank affiliate/digital products
4. 5R CENT COM AI — Etsy store builder + ad engine
5. 5R2Shopify Dominance — Shopify store + product engine
6. 5R Mindset — Youth sports journals (Amazon KDP, Etsy, Lulu)
7. 5R REI Studio — Tax sales / real estate investing
8. 5R Operation RVETs — Nonprofit: homeless vets to RV business (SDVOSB)
9. 5R RV Repair School — Courses + certification
10. 5R Survival Readiness — Preparedness digital products
11. 5R Photo/Video Training — Courses leveraging Ed's media background
12. 5R Coach the Coach — Youth sports coach training
13. 5R Pro AI Prompt Engine — GPT for people who struggle with prompts
14. 5R Signal Synch — Autopilot trading signals + financial advisor agent

SHARED INFRASTRUCTURE: Gumroad (primary sales), Vercel (hosting), MailerLite/ConvertKit (email), Metricool (social), Synthesia/HeyGen (video avatars: Isabel, Jordan, Cam, Raya), Canva (design)
Contact: support@5rtradesuite.com


PRICING AND TIER STRUCTURE (applies to ALL trades and small business verticals):
- FREE: 1 agent (lead capture) — $0
- STARTER: 3 agents + Free = 4 total — $25/month
- PRO: 5 agents + all Starter + Free = 9 total — $100/month
- ELITE: 6 agents + all Pro + Starter + Free = 15 total — $175/month

SCALE: This structure applies to every trade and small business vertical.
Minimum 15 trades planned. Each trade has uniquely named agents but same tier structure.
Current 5 trades: Electricians (SmartSpark), Plumbers (FlowFix), Roofers (SmartRoofer), Remodelers (SmartBuild), Landscapers (SmartYard).


ALWAYS USE: AI agents not bots or chatbots. If no business specified, default to 5R TradeSuite AI.
=========================================================

YOUR ROLE: Training, Curriculum Design, and Educational Content Specialist for all 14 businesses.

CUSTOMER ONBOARDING: Step-by-step setup guides. First-7-days onboarding email sequences. FAQ documents. Written for non-technical trade business owners — no jargon, short sentences, numbered steps always.

HOW-TO GUIDES: How to set up your AI agent, how to add your agent to your website, how to use your agent daily, how to upgrade to the next tier.

COURSE CURRICULUM (RV Repair School, Coach the Coach, Photo/Video Training): Full curriculum design, module structure, lesson outlines, Thinkific-ready course architecture.

TONE: Patient, clear, written for non-technical people. Always number your steps.

SELF-IDENTIFICATION PROTOCOL: If you detect issues or blockers in your domain, flag them immediately with ISSUE DETECTED and recommend the fix or the right agent to escalate to. Always adapt and learn from each conversation to serve Ed better.`;
const GREETING = "Hey Ed \u2014 I am Tomas, your Training AI Agent.\\n\\nI build all customer training, onboarding content, and course curriculum across the 5R ecosystem.\\n\\nWhat do you need built?";
const QR_OPTIONS = ["📋 Getting started guide", "🚀 Onboarding email sequence", "📖 How-to article", "🎬 Tutorial script", "❓ FAQ document", "🎓 Course curriculum design"];
let conversationHistory = [];
const chatWindow = document.getElementById('chatWindow');
const userInput = document.getElementById('userInput');
userInput.addEventListener('input', function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
userInput.addEventListener('keydown', function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
function scrollToBottom(){setTimeout(()=>chatWindow.scrollTop=chatWindow.scrollHeight,50);}
function addMessage(role, text, skipHistory){
  const msgDiv=document.createElement('div');msgDiv.className='msg '+role;
  const avatar=document.createElement('div');avatar.className='msg-avatar';avatar.textContent=role==='bot'?'📚':'👤';
  const bubble=document.createElement('div');bubble.className='bubble';bubble.innerHTML=text.replace(/\n/g,'<br>');
  msgDiv.appendChild(avatar);msgDiv.appendChild(bubble);chatWindow.appendChild(msgDiv);
  if(!skipHistory)conversationHistory.push({role:role==='bot'?'assistant':'user',content:text});
  scrollToBottom();
}
function addQuickReplies(options){
  const qrDiv=document.createElement('div');qrDiv.className='quick-replies';
  options.forEach(function(opt){
    const btn=document.createElement('button');btn.className='qr-btn';btn.textContent=opt;
    btn.onclick=function(){qrDiv.remove();userInput.value=opt;sendMessage();};
    qrDiv.appendChild(btn);
  });
  chatWindow.appendChild(qrDiv);scrollToBottom();
}
function showTyping(){
  const t=document.createElement('div');t.className='typing';t.id='typing-indicator';
  const a=document.createElement('div');a.className='msg-avatar';a.textContent='📚';
  const d=document.createElement('div');d.className='typing-dots';d.innerHTML='<span></span><span></span><span></span>';
  t.appendChild(a);t.appendChild(d);chatWindow.appendChild(t);scrollToBottom();
}
function removeTyping(){const t=document.getElementById('typing-indicator');if(t)t.remove();}
async function sendMessage(){
  const text=userInput.value.trim();if(!text)return;
  const qrs=chatWindow.querySelector('.quick-replies');if(qrs)qrs.remove();
  addMessage('user',text);userInput.value='';userInput.style.height='auto';showTyping();
  try{
    const response=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:SYSTEM_PROMPT,messages:conversationHistory})});
    const data=await response.json();removeTyping();
    if(data.content&&data.content[0]){
      addMessage('bot',data.content[0].text);
      setTimeout(function(){addQuickReplies(QR_OPTIONS);},400);
    }else{addMessage('bot','Something went wrong. Try again.');}
  }catch(err){removeTyping();addMessage('bot','Connection issue — try again.');}
}
setTimeout(function(){
  addMessage('bot', GREETING, true);
  setTimeout(function(){addQuickReplies(QR_OPTIONS);},400);
},600);
</script>
</body>
</html>
